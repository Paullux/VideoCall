name: Build — Windows Installer

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Create client/.env
        shell: bash
        run: |
          echo "KINDE_DOMAIN=${{ secrets.KINDE_DOMAIN }}" >> client/.env
          echo "KINDE_CLIENT_ID=${{ secrets.KINDE_CLIENT_ID }}" >> client/.env
          echo "SIGNALING_URL=${{ secrets.SIGNALING_URL }}" >> client/.env

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build & package
        working-directory: client
        run: npm run package

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "client/dist/*.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "VideoCall ${{ github.ref_name }}"
          draft: false
          prerelease: false
